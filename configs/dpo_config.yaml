model:
  sft_checkpoint: "models/sft-lora"
  load_in_4bit: true

dpo:
  beta: 0.1
  loss_type: "sigmoid"

training:
  num_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  max_seq_length: 2048
  logging_steps: 10
  save_steps: 50

data:
  train_path: "data/dpo_train.jsonl"
  eval_path: "data/dpo_eval.jsonl"

output:
  dir: "models/dpo-lora"
