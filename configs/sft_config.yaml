# Supervised Fine-Tuning Config
# Task: Function-calling accuracy (Glaive-style)
# Supports both LoRA (full precision) and QLoRA (4-bit quantized)

model:
  name: "Qwen/Qwen3-8B"
  # Set to true for QLoRA (4-bit), false for standard LoRA (16-bit)
  # QLoRA: ~6GB VRAM on a single T4/A10, LoRA: ~16GB VRAM on an A100
  load_in_4bit: true

lora:
  r: 16                    # Rank - higher = more capacity but more VRAM
  lora_alpha: 32           # Scaling factor, typically 2x rank
  lora_dropout: 0.05       # Regularization
  target_modules:          # Which layers to adapt
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"          # Also target MLP layers for function-calling
    - "up_proj"
    - "down_proj"

training:
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4  # Effective batch size = 4 * 4 = 16
  learning_rate: 2.0e-4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 2048
  logging_steps: 10
  save_steps: 100
  eval_steps: 50
  lr_scheduler_type: "cosine"
  bf16: true

data:
  # Use local examples (20 examples, good for quick testing)
  train_path: "data/sft_train.jsonl"
  eval_path: "data/sft_eval.jsonl"
  # For full training, use Glaive dataset (run: python src/download_dataset.py)
  # train_path: "data/glaive_sft_train.jsonl"
  # eval_path: "data/glaive_sft_eval.jsonl"
  format: "instruction"  # instruction-input-output format

output:
  dir: "models/sft-lora"
