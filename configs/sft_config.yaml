model:
  name: "Qwen/Qwen3-8B"
  load_in_4bit: true  # QLoRA

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]

training:
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.1
  max_seq_length: 2048
  logging_steps: 10
  save_steps: 100
  eval_steps: 50

data:
  train_path: "data/sft_train.jsonl"
  eval_path: "data/sft_eval.jsonl"
  format: "instruction"  # instruction-input-output format

output:
  dir: "models/sft-lora"
